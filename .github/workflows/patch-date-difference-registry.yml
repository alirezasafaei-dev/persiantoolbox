name: Patch date difference registry

on:
  push:
    branches:
      - seo/date-difference-ctr-2026-07

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: seo/date-difference-ctr-2026-07
          fetch-depth: 0

      - name: Update registry metadata
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          path = Path('lib/tools-registry.ts')
          text = path.read_text(encoding='utf-8')
          old = """  {
            id: 'date-difference',
            path: '/date-tools/date-difference',
            title: 'محاسبه اختلاف تاریخ رایگان - جعبه ابزار فارسی',
            description: 'محاسبه آنی تعداد روز، هفته، ماه و سال بین دو تاریخ میلادی',
            keywords: ['محاسبه اختلاف تاریخ', 'difference between dates', 'روز شمار', 'محاسبه روز'],
            indexable: true,
            lastModified: '2026-06-16',
            kind: 'tool',
            category: categoryOrThrow('date'),
          },
          """.replace('          ', '')
          new = """  {
            id: 'date-difference',
            path: '/date-tools/date-difference',
            title: 'محاسبه فاصله بین دو تاریخ شمسی و میلادی | تعداد روز',
            description:
              'فاصله دو تاریخ را به تعداد دقیق روز، هفته، ماه و سال تقریبی محاسبه کنید؛ با پشتیبانی از تاریخ شمسی و میلادی، رایگان و بدون ثبت‌نام.',
            keywords: [
              'محاسبه فاصله دو تاریخ',
              'تعداد روز بین دو تاریخ',
              'اختلاف تاریخ شمسی',
              'اختلاف تاریخ میلادی',
              'محاسبه روز بین دو تاریخ',
              'روز شمار آنلاین',
            ],
            indexable: true,
            lastModified: '2026-07-18',
            kind: 'tool',
            category: categoryOrThrow('date'),
          },
          """.replace('          ', '')
          if text.count(old) != 1:
              raise SystemExit('date-difference registry entry did not match exactly')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/patch-date-difference-registry.yml
          git add lib/tools-registry.ts
          git diff --cached --check
          git commit -s -m "fix(seo): update date-difference registry metadata"
          git push origin HEAD:seo/date-difference-ctr-2026-07
