name: lighthouse-ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: lighthouse-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lhci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_GOOGLE_ANALYTICS_ID: ''
      NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lighthouse CI against this build
        run: pnpm lighthouse:ci

      - name: Upload LHCI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lhci-report
          include-hidden-files: true
          path: |
            .lighthouseci
            lighthouse-reports
            docs/release/reports/lighthouse-trend-summary.json
          if-no-files-found: warn
