name: Prettier canonical sitemap

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: seo/gsc-canonical-dataset-audit-2026-07-18
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - name: Format sitemap with project Prettier
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec prettier --write app/sitemap.ts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/prettier-canonical-sitemap.yml
          git add app/sitemap.ts
          git diff --cached --check
          git commit -s -m "style(seo): format canonical sitemap"
          git push origin HEAD:seo/gsc-canonical-dataset-audit-2026-07-18
