name: refresh-security-overrides

on:
  pull_request:
    paths:
      - '.github/workflows/refresh-security-overrides.yml'

permissions:
  contents: write

jobs:
  refresh:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
      - name: Patch production dependency overrides
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('package.json')
          text = path.read_text()
          old = '      "fast-uri": "3.1.3",'
          new = '      "fast-uri": "3.1.4",\n      "sharp": "0.35.3",'
          if text.count(old) != 1:
              raise SystemExit(f'expected one fast-uri override, found {text.count(old)}')
          path.write_text(text.replace(old, new))
          PY
          pnpm install --lockfile-only --no-frozen-lockfile
          grep -q "fast-uri: 3.1.4" pnpm-lock.yaml
          grep -q "sharp: 0.35.3" pnpm-lock.yaml
          ! grep -q "fast-uri: 3.1.3" pnpm-lock.yaml
          git rm .github/workflows/refresh-security-overrides.yml
      - name: Commit patched dependency graph
        run: |
          git config user.name 'OpenAI Codex'
          git config user.email 'codex@openai.com'
          git add package.json pnpm-lock.yaml
          git commit -m 'fix(security): patch fast-uri and sharp advisories'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
