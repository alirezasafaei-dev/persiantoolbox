name: add-legacy-bootstrap-input

on:
  pull_request:
    paths:
      - '.github/workflows/add-legacy-bootstrap-input.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Add one-time cache bootstrap input
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/deploy-production.yml')
          lines = path.read_text().splitlines()

          if '      allow_legacy_cache_bootstrap:' not in lines:
              recovery = lines.index('      allow_recovery_deploy:')
              base_url = lines.index('      base_url:', recovery)
              lines[base_url:base_url] = [
                  '      allow_legacy_cache_bootstrap:',
                  '        description: One-time migration only; skip current legacy cache headers before switching',
                  '        required: false',
                  "        default: 'false'",
                  '        type: choice',
                  "        options: ['false', 'true']",
              ]

          env_line = "      ALLOW_RECOVERY_DEPLOY: ${{ github.event.inputs.allow_recovery_deploy || 'false' }}"
          legacy_env = "      ALLOW_LEGACY_CACHE_BOOTSTRAP: ${{ github.event.inputs.allow_legacy_cache_bootstrap || 'false' }}"
          if legacy_env not in lines:
              env_index = lines.index(env_line)
              lines.insert(env_index + 1, legacy_env)

          path.write_text('\n'.join(lines) + '\n')
          PY
          git rm .github/workflows/add-legacy-bootstrap-input.yml
      - name: Commit workflow contract
        run: |
          git config user.name 'OpenAI Codex'
          git config user.email 'codex@openai.com'
          git add .github/workflows/deploy-production.yml
          git commit -m 'fix(cd): expose legacy cache bootstrap input'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
