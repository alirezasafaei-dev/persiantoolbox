name: Restore and remove SearchAction safely

on:
  push:
    branches:
      - seo/gsc-canonical-dataset-audit-2026-07-18

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: seo/gsc-canonical-dataset-audit-2026-07-18
          fetch-depth: 0

      - name: Restore sources and remove the exact retired block
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- app/layout.tsx components/HomePage.tsx

          python <<'PY'
          from pathlib import Path

          block = '\n'.join([
              '        potentialAction: {',
              "          '@type': 'SearchAction',",
              '          target: {',
              "            '@type': 'EntryPoint',",
              '            urlTemplate: `${siteUrl}/search?q={search_term_string}`,',
              '          },',
              "          'query-input': 'required name=search_term_string',",
              '        },',
              '',
          ])

          for path in ('app/layout.tsx', 'components/HomePage.tsx'):
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              count = text.count(block)
              if count != 1:
                  raise SystemExit(f'{path}: expected exactly one complete SearchAction block, found {count}')
              result = text.replace(block, '', 1)
              if 'SearchAction' in result or '{search_term_string}' in result or "'query-input'" in result:
                  raise SystemExit(f'{path}: retired SearchAction residue remains')
              file.write_text(result, encoding='utf-8')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/restore-and-remove-search-action.yml
          git add app/layout.tsx components/HomePage.tsx
          git diff --cached --check
          git commit -s -m "fix(seo): remove retired SearchAction safely"
          git push origin HEAD:seo/gsc-canonical-dataset-audit-2026-07-18
