name: address-hardening-patch

on:
  push:
    branches:
      - fix/address-transliteration-hardening

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/address-transliteration-hardening
      - name: Apply deterministic address UI patch
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('components/features/text-tools/AddressFaToEnTool.tsx')
          text = path.read_text()

          replacements = [
              (
                  "import {\n  convertPersianAddressToEnglish,\n  type AddressOutputMode,\n  type PersianAddressInput,\n} from '@/features/text-tools/address-fa-to-en';",
                  "import {\n  applyAddressOutputCorrections,\n  buildPersianAddressQuery,\n  convertPersianAddressToEnglish,\n  type AddressOutputMode,\n  type PersianAddressInput,\n} from '@/features/text-tools/address-fa-to-en';",
              ),
              (
                  "  useEffect(() => {\n    trackAddressEvent('address_tool_started', { mode });\n  }, []);",
                  "  useEffect(() => {\n    trackAddressEvent('address_tool_started');\n  }, []);",
              ),
              (
                  "  const multiLineOutput = useMemo(() => {\n    if (!output) {\n      return '';\n    }\n    const city = correctedFields['city'] || output.city;\n    const stateProvince = correctedFields['stateProvince'] || output.stateProvince;\n    const country = correctedFields['country'] || output.country;\n    const postalCode = correctedFields['postalCode'] || output.postalCode;\n    return [\n      output.addressLine1,\n      output.addressLine2,\n      `${city}, ${stateProvince}`,\n      `${country}${postalCode ? `, ${postalCode}` : ''}`,\n    ]\n      .filter(Boolean)\n      .join('\\n');\n  }, [output, correctedFields]);\n\n  const mapQuery = encodeURIComponent(output?.singleLine ?? '');",
                  "  const resolvedOutput = useMemo(\n    () => (output ? applyAddressOutputCorrections(output, correctedFields) : null),\n    [output, correctedFields],\n  );\n\n  const multiLineOutput = useMemo(() => {\n    if (!resolvedOutput) {\n      return '';\n    }\n    return [\n      resolvedOutput.addressLine1,\n      resolvedOutput.addressLine2,\n      `${resolvedOutput.city}, ${resolvedOutput.stateProvince}`,\n      `${resolvedOutput.country}${\n        resolvedOutput.postalCode ? `, ${resolvedOutput.postalCode}` : ''\n      }`,\n    ]\n      .filter(Boolean)\n      .join('\\n');\n  }, [resolvedOutput]);\n\n  const mapQuery = encodeURIComponent(buildPersianAddressQuery(form));",
              ),
              (
                  "      input: form,\n      generated: output,",
                  "      reviewTerms: output.reviewTerms,",
              ),
              (
                  "      const isSingleLine = value === output?.singleLine;",
                  "      const isSingleLine = value === resolvedOutput?.singleLine;",
              ),
              (
                  "            value={output.singleLine}",
                  "            value={resolvedOutput?.singleLine ?? ''}",
              ),
              (
                  "              onClick={() => copyText(output.singleLine, 'خروجی تک‌خطی')}",
                  "              onClick={() => copyText(resolvedOutput?.singleLine ?? '', 'خروجی تک‌خطی')}",
              ),
              (
                  "                english: correctedFields['city'] || output.city,",
                  "                english: resolvedOutput?.city ?? output.city,",
              ),
              (
                  "                english: correctedFields['stateProvince'] || output.stateProvince,",
                  "                english: resolvedOutput?.stateProvince ?? output.stateProvince,",
              ),
              (
                  "                english: correctedFields['country'] || output.country,",
                  "                english: resolvedOutput?.country ?? output.country,",
              ),
              (
                  "                english: correctedFields['postalCode'] || output.postalCode,",
                  "                english: resolvedOutput?.postalCode ?? output.postalCode,",
              ),
              (
                  "                english: output.addressLine1,",
                  "                english: resolvedOutput?.addressLine1 ?? output.addressLine1,",
              ),
              (
                  "                english: output.addressLine2,",
                  "                english: resolvedOutput?.addressLine2 ?? output.addressLine2,",
              ),
              (
                  "          <AddressTemplates\n            output={{\n              ...output,\n              city: correctedFields['city'] || output.city,\n              stateProvince: correctedFields['stateProvince'] || output.stateProvince,\n              country: correctedFields['country'] || output.country,\n              postalCode: correctedFields['postalCode'] || output.postalCode,\n            }}\n            persianInput={form}\n          />",
                  "          <AddressTemplates output={resolvedOutput ?? output} persianInput={form} />",
              ),
              (
                  "              آدرس خروجی را مستقیما در نقشه‌های داخلی باز کنید، نقطه دقیق را انتخاب کنید و نتیجه\n              نهایی را تایید کنید.",
                  "              آدرس فارسی را در نقشه‌های داخلی باز کنید، نقطه دقیق را انتخاب کنید و املای لاتین\n              را با نام رایج همان مکان تطبیق دهید.",
              ),
              (
                  "              اگر املای خروجی دقیق نیست، خروجی پیشنهادی خود را ثبت کنید تا واژه‌نامه ابزار بهتر شود.",
                  "              اگر املای خروجی دقیق نیست، فقط واژه و املای پیشنهادی را ارسال کنید. پلاک، واحد و\n              کدپستی در گزارش خودکار قرار نمی‌گیرند.",
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one match, found {count}: {old[:90]!r}')
              text = text.replace(old, new)

          path.write_text(text)
          PY

          git diff --check
          git config user.name 'ASDEV Automation'
          git config user.email 'alirezasafaeisystems@gmail.com'
          git add components/features/text-tools/AddressFaToEnTool.tsx
          git commit -s -m 'fix(address): apply corrections to every output surface'
          git push origin HEAD:fix/address-transliteration-hardening
