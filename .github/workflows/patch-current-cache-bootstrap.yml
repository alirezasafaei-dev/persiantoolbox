name: patch-current-cache-bootstrap

on:
  pull_request:
    paths:
      - '.github/workflows/patch-current-cache-bootstrap.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Patch current-release cache bootstrap contract
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('ops/deploy/deploy-production-blue-green.sh')
          text = path.read_text()

          replacements = [
              (
                  'ALLOW_RECOVERY_DEPLOY="${ALLOW_RECOVERY_DEPLOY:-false}"\nif [[ "$ALLOW_RECOVERY_DEPLOY" != "true" && "$ALLOW_RECOVERY_DEPLOY" != "false" ]]; then\n  echo "[production-deploy] ALLOW_RECOVERY_DEPLOY must be true or false" >&2\n  exit 64\nfi',
                  'ALLOW_RECOVERY_DEPLOY="${ALLOW_RECOVERY_DEPLOY:-false}"\nALLOW_LEGACY_CACHE_BOOTSTRAP="${ALLOW_LEGACY_CACHE_BOOTSTRAP:-false}"\nif [[ "$ALLOW_RECOVERY_DEPLOY" != "true" && "$ALLOW_RECOVERY_DEPLOY" != "false" ]]; then\n  echo "[production-deploy] ALLOW_RECOVERY_DEPLOY must be true or false" >&2\n  exit 64\nfi\nif [[ "$ALLOW_LEGACY_CACHE_BOOTSTRAP" != "true" && "$ALLOW_LEGACY_CACHE_BOOTSTRAP" != "false" ]]; then\n  echo "[production-deploy] ALLOW_LEGACY_CACHE_BOOTSTRAP must be true or false" >&2\n  exit 64\nfi',
              ),
              (
                  'if [[ "$ALLOW_RECOVERY_DEPLOY" == "true" ]]; then\n  CURRENT_VERIFY_HEALTH=false\n  echo "[production-deploy] recovery mode: current-release health is skipped, assets and commit remain mandatory" >&2\nfi\n\nVERIFY_HEALTH="$CURRENT_VERIFY_HEALTH" bash "$VERIFY_SCRIPT" \\\n  "http://127.0.0.1:$CURRENT_PORT" "$CURRENT_COMMIT"\nVERIFY_HEALTH="$CURRENT_VERIFY_HEALTH" bash "$VERIFY_SCRIPT" "$BASE_URL" "$CURRENT_COMMIT"',
                  'if [[ "$ALLOW_RECOVERY_DEPLOY" == "true" ]]; then\n  CURRENT_VERIFY_HEALTH=false\n  echo "[production-deploy] recovery mode: current-release health is skipped, assets and commit remain mandatory" >&2\nfi\nCURRENT_VERIFY_CACHE_HEADERS=true\nif [[ "$ALLOW_LEGACY_CACHE_BOOTSTRAP" == "true" ]]; then\n  CURRENT_VERIFY_CACHE_HEADERS=false\n  echo "[production-deploy] legacy cache bootstrap: only current-release cache headers are skipped" >&2\nfi\n\nVERIFY_HEALTH="$CURRENT_VERIFY_HEALTH" VERIFY_CACHE_HEADERS="$CURRENT_VERIFY_CACHE_HEADERS" \\\n  bash "$VERIFY_SCRIPT" "http://127.0.0.1:$CURRENT_PORT" "$CURRENT_COMMIT"\nVERIFY_HEALTH="$CURRENT_VERIFY_HEALTH" VERIFY_CACHE_HEADERS="$CURRENT_VERIFY_CACHE_HEADERS" \\\n  bash "$VERIFY_SCRIPT" "$BASE_URL" "$CURRENT_COMMIT"',
              ),
              (
                  'VERIFY_HEALTH="$CURRENT_VERIFY_HEALTH" bash \\\n      "$RELEASE_DIR/scripts/deploy/verify-release-assets.sh" "$BASE_URL" "$CURRENT_COMMIT" || true',
                  'VERIFY_HEALTH="$CURRENT_VERIFY_HEALTH" VERIFY_CACHE_HEADERS="$CURRENT_VERIFY_CACHE_HEADERS" \\\n      bash "$RELEASE_DIR/scripts/deploy/verify-release-assets.sh" "$BASE_URL" "$CURRENT_COMMIT" || true',
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected exactly one patch target, found {count}: {old[:80]}')
              text = text.replace(old, new)

          path.write_text(text)
          PY
          bash -n ops/deploy/deploy-production-blue-green.sh
          git rm .github/workflows/patch-current-cache-bootstrap.yml
      - name: Commit deterministic patch
        run: |
          git config user.name 'OpenAI Codex'
          git config user.email 'codex@openai.com'
          git add ops/deploy/deploy-production-blue-green.sh
          git commit -m 'fix(deploy): allow one-time current cache migration'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
