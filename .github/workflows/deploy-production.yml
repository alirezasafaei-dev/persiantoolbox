# Production deployment is manual-only and fail-closed.
name: deploy-production

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Git ref/SHA to deploy
        required: false
        default: main
      run_migrations:
        description: Run database migrations
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      allow_recovery_deploy:
        description: One-time bootstrap only; skip health for the current degraded release, never for the candidate
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      base_url:
        description: Public URL for strict verification
        required: false
        default: https://persiantoolbox.ir
      post_report_strict:
        description: Fail when the post-deploy report fails
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  preflight-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate deploy secrets
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          PRODUCTION_ENV_FILE_B64: ${{ secrets.PRODUCTION_ENV_FILE_B64 }}
        run: |
          set -euo pipefail
          required=(DEPLOY_SSH_KEY DEPLOY_SSH_HOST DEPLOY_SSH_PORT DEPLOY_SSH_USER PRODUCTION_ENV_FILE_B64)
          missing=()
          for key in "${required[@]}"; do
            [[ -n "${!key:-}" ]] || missing+=("$key")
          done
          (( ${#missing[@]} == 0 )) || {
            echo "::error::Missing required deploy secrets: ${missing[*]}"
            exit 1
          }
          [[ "$DEPLOY_SSH_PORT" =~ ^[0-9]+$ ]] || {
            echo "::error::DEPLOY_SSH_PORT must be numeric"
            exit 1
          }

  deploy-gate:
    needs: preflight-secrets
    uses: ./.github/workflows/deploy-gate.yml
    secrets: inherit

  deploy:
    needs: [preflight-secrets, deploy-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 75
    environment: production
    env:
      APP_SLUG: persian-tools
      DEPLOY_BASE_DIR: /var/www/persian-tools
      SSH_OPTS: -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes
      RELEASE_REF: ${{ github.event.inputs.release_ref || 'main' }}
      RUN_MIGRATIONS: ${{ github.event.inputs.run_migrations || 'false' }}
      ALLOW_RECOVERY_DEPLOY: ${{ github.event.inputs.allow_recovery_deploy || 'false' }}
      BASE_URL: ${{ github.event.inputs.base_url || 'https://persiantoolbox.ir' }}
      POST_REPORT_STRICT: ${{ github.event.inputs.post_report_strict || 'true' }}
    steps:
      - name: Checkout exact release
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Compute immutable release metadata
        id: meta
        run: |
          set -euo pipefail
          RELEASE_SHA="$(git rev-parse HEAD)"
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "release_id=production-${GITHUB_RUN_ID}-${RELEASE_SHA:0:12}" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$RELEASE_SHA" > .git-revision

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release gates
        env:
          RC_GATE_TIMEOUT_MS: 900000
        run: |
          set -euo pipefail
          pnpm ci:quick
          pnpm ci:contracts
          pnpm release:rc:run
          pnpm release:launch:run
          pnpm build
          pnpm predeploy:smoke

      - name: Package immutable source
        run: |
          set -euo pipefail
          RELEASE_ID="${{ steps.meta.outputs.release_id }}"
          ARCHIVE_PATH="/tmp/persian-tools-${RELEASE_ID}.tar.gz"
          tar -czf "$ARCHIVE_PATH" \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=coverage \
            --exclude=playwright-report \
            --exclude=test-results \
            --exclude=.next/cache \
            --exclude=docs/snapshots \
            .

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.DEPLOY_SSH_PORT }}" -H "${{ secrets.DEPLOY_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Remote fail-closed preflight
        run: |
          ssh ${SSH_OPTS} -p "${{ secrets.DEPLOY_SSH_PORT }}" "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" "
            set -euo pipefail
            command -v node >/dev/null
            command -v pnpm >/dev/null
            command -v pm2 >/dev/null
            command -v rsync >/dev/null
            command -v flock >/dev/null
            command -v nginx >/dev/null
            test -f /etc/nginx/.persiantoolbox-static-safe
            mkdir -p '${DEPLOY_BASE_DIR}/tmp' '${DEPLOY_BASE_DIR}/shared/env' '${DEPLOY_BASE_DIR}/shared/logs' '${DEPLOY_BASE_DIR}/shared/deploy'
          "

      - name: Upload source and environment
        run: |
          set -euo pipefail
          RELEASE_ID="${{ steps.meta.outputs.release_id }}"
          ARCHIVE_PATH="/tmp/persian-tools-${RELEASE_ID}.tar.gz"
          scp -O ${SSH_OPTS} -P "${{ secrets.DEPLOY_SSH_PORT }}" \
            "$ARCHIVE_PATH" \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:/tmp/persian-tools-${RELEASE_ID}.tar.gz"
          echo "${{ secrets.PRODUCTION_ENV_FILE_B64 }}" | base64 --decode > production.env
          chmod 600 production.env
          scp -O ${SSH_OPTS} -P "${{ secrets.DEPLOY_SSH_PORT }}" \
            production.env \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:/tmp/persian-tools-production.env"

      - name: Atomic blue-green deploy on VPS
        id: deploy_vps
        run: |
          RELEASE_ID="${{ steps.meta.outputs.release_id }}"
          RELEASE_SHA="${{ steps.meta.outputs.release_sha }}"
          ssh ${SSH_OPTS} -p "${{ secrets.DEPLOY_SSH_PORT }}" "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" "
            set -euo pipefail
            BASE='${DEPLOY_BASE_DIR}'
            RELEASE='$RELEASE_ID'
            RELEASE_SHA='$RELEASE_SHA'
            TMP_DIR=\"\$BASE/tmp/\$RELEASE\"
            ARCHIVE_PATH=\"/tmp/persian-tools-\$RELEASE.tar.gz\"
            cleanup() { rm -rf \"\$TMP_DIR\" \"\$ARCHIVE_PATH\"; }
            trap cleanup EXIT
            mkdir -p \"\$TMP_DIR\" \"\$BASE/shared/env\"
            install -m 600 /tmp/persian-tools-production.env \"\$BASE/shared/env/production.env\"
            rm -f /tmp/persian-tools-production.env
            tar -xzf \"\$ARCHIVE_PATH\" -C \"\$TMP_DIR\"
            chmod +x \
              \"\$TMP_DIR/ops/deploy/deploy-production-blue-green.sh\" \
              \"\$TMP_DIR/scripts/deploy/verify-release-assets.sh\"
            ALLOW_RECOVERY_DEPLOY='${ALLOW_RECOVERY_DEPLOY}' \
            SOURCE_GIT_SHA=\"\$RELEASE_SHA\" \
              \"\$TMP_DIR/ops/deploy/deploy-production-blue-green.sh\" \
                --app-slug '${APP_SLUG}' \
                --base-dir \"\$BASE\" \
                --source-dir \"\$TMP_DIR\" \
                --release-id \"\$RELEASE\" \
                --keep-releases 5 \
                --run-migrations '${RUN_MIGRATIONS}' \
                --base-url '${BASE_URL}' \
                --env-file \"\$BASE/shared/env/production.env\"
          "

      - name: Verify active slot and every referenced asset
        run: |
          RELEASE_SHA="${{ steps.meta.outputs.release_sha }}"
          ssh ${SSH_OPTS} -p "${{ secrets.DEPLOY_SSH_PORT }}" "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" "
            set -euo pipefail
            STATE='${DEPLOY_BASE_DIR}/shared/deploy/production-current.env'
            test -f \"\$STATE\"
            source \"\$STATE\"
            test \"\$RELEASE_SHA\" = '$RELEASE_SHA'
            test \"\$ACTIVE_PORT\" = '3000' -o \"\$ACTIVE_PORT\" = '3003'
            bash \"\$RELEASE_DIR/scripts/deploy/verify-release-assets.sh\" \
              \"http://127.0.0.1:\$ACTIVE_PORT\" '$RELEASE_SHA'
            bash \"\$RELEASE_DIR/scripts/deploy/verify-release-assets.sh\" \
              '${BASE_URL}' '$RELEASE_SHA'
          "

      - name: Generate strict production report
        id: post_report
        timeout-minutes: 8
        run: |
          REPORT_NAME="post-deploy-production-${{ github.run_id }}.md"
          REMOTE_REPORT="/tmp/${REPORT_NAME}"
          REMOTE_STATUS="/tmp/${REPORT_NAME}.status"
          LOCAL_REPORT="docs/deployment/reports/${REPORT_NAME}"
          LOCAL_STATUS="docs/deployment/reports/${REPORT_NAME}.status"
          mkdir -p docs/deployment/reports
          ssh ${SSH_OPTS} -p "${{ secrets.DEPLOY_SSH_PORT }}" "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" "
            set -euo pipefail
            cd '${DEPLOY_BASE_DIR}/current/production'
            set -a
            source '${DEPLOY_BASE_DIR}/shared/env/production.env'
            set +a
            set +e
            node scripts/deploy/generate-post-deploy-report.mjs \
              --base-url='${BASE_URL}' \
              --environment=production \
              --git-ref='${{ steps.meta.outputs.release_sha }}' \
              --workflow-run-url='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}' \
              --deployer='${{ github.actor }}' \
              --output=\"${REMOTE_REPORT}\" \
              --strict='${POST_REPORT_STRICT}' \
              --migration-executed='${RUN_MIGRATIONS}' \
              --backup-path='${BACKUP_DIR:-/var/backups/persian-tools}' \
              --backup-max-age-hours=36 \
              --retry-count=2 \
              --retry-delay-ms=400 \
              --timeout-ms=5000
            REPORT_EXIT=\$?
            set -e
            printf '%s' \"\$REPORT_EXIT\" > '${REMOTE_STATUS}'
          "
          scp -O ${SSH_OPTS} -P "${{ secrets.DEPLOY_SSH_PORT }}" \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:${REMOTE_REPORT}" "$LOCAL_REPORT"
          scp -O ${SSH_OPTS} -P "${{ secrets.DEPLOY_SSH_PORT }}" \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:${REMOTE_STATUS}" "$LOCAL_STATUS"
          REPORT_EXIT_CODE="$(cat "$LOCAL_STATUS")"
          [[ "$REPORT_EXIT_CODE" == '0' ]] || exit "$REPORT_EXIT_CODE"

      - name: Roll back to recorded previous slot on any post-switch failure
        if: failure() && steps.deploy_vps.outcome == 'success'
        run: |
          ssh ${SSH_OPTS} -p "${{ secrets.DEPLOY_SSH_PORT }}" "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" "
            set -euo pipefail
            bash '${DEPLOY_BASE_DIR}/current/production/ops/deploy/rollback.sh' \
              --app-slug '${APP_SLUG}' \
              --env production \
              --base-dir '${DEPLOY_BASE_DIR}' \
              --base-url '${BASE_URL}'
          "

      - name: Upload production report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-post-deploy-report
          path: docs/deployment/reports/post-deploy-production-${{ github.run_id }}.md
          if-no-files-found: warn
