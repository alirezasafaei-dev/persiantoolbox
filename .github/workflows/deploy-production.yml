# Production deployment is manual-only and fail-closed.
name: deploy-production

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Main ref to deploy; must resolve to the current origin/main SHA
        required: false
        default: main
      current_production_sha:
        description: Exact current production SHA; required only while the live runtime reports commit=null
        required: false
        default: ''
      run_migrations:
        description: Run database migrations
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      allow_recovery_deploy:
        description: Skip only the current release health assertion; candidate and final audits remain strict
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      base_url:
        description: Public URL for strict verification
        required: false
        default: https://persiantoolbox.ir
      post_report_strict:
        description: Fail when the post-deploy report fails
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  preflight-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate deploy secrets
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: |
          set -euo pipefail
          required=(DEPLOY_SSH_KEY DEPLOY_SSH_HOST DEPLOY_SSH_PORT DEPLOY_SSH_USER)
          missing=()
          for key in "${required[@]}"; do
            [[ -n "${!key:-}" ]] || missing+=("$key")
          done
          (( ${#missing[@]} == 0 )) || {
            echo "::error::Missing required deploy secrets: ${missing[*]}"
            exit 1
          }
          [[ "$DEPLOY_SSH_PORT" =~ ^[0-9]+$ ]] || {
            echo "::error::DEPLOY_SSH_PORT must be numeric"
            exit 1
          }

  deploy-gate:
    needs: preflight-secrets
    uses: ./.github/workflows/deploy-gate.yml
    secrets: inherit

  deploy:
    needs: [preflight-secrets, deploy-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 100
    environment: production
    env:
      DEPLOY_BASE_DIR: /home/ubuntu/persiantoolbox-blue-green
      LEGACY_RELEASES_DIR: /home/ubuntu/persiantoolbox-releases
      STATIC_STORE: /home/ubuntu/persiantoolbox-shared-assets
      RELEASE_REF: ${{ github.event.inputs.release_ref || 'main' }}
      CURRENT_PRODUCTION_SHA: ${{ github.event.inputs.current_production_sha || '' }}
      RUN_MIGRATIONS: ${{ github.event.inputs.run_migrations || 'false' }}
      ALLOW_RECOVERY_DEPLOY: ${{ github.event.inputs.allow_recovery_deploy || 'false' }}
      BASE_URL: ${{ github.event.inputs.base_url || 'https://persiantoolbox.ir' }}
      POST_REPORT_STRICT: ${{ github.event.inputs.post_report_strict || 'true' }}
    steps:
      - name: Checkout exact release
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - name: Compute immutable release metadata
        id: meta
        run: |
          set -euo pipefail
          git fetch origin main
          RELEASE_SHA="$(git rev-parse HEAD)"
          MAIN_SHA="$(git rev-parse origin/main)"
          [[ "$RELEASE_SHA" == "$MAIN_SHA" ]] || {
            echo "::error::Production releases must match current origin/main"
            exit 1
          }
          if [[ -n "$CURRENT_PRODUCTION_SHA" && ! "$CURRENT_PRODUCTION_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::current_production_sha must be an exact 40-character SHA"
            exit 1
          fi
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$RELEASE_SHA" > .git-revision

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify canonical engine contract
        run: |
          set -euo pipefail
          test -f ops/deploy/deploy-production-blue-green.sh
          bash -n deploy-blue-green.sh
          bash -n ops/deploy/deploy-production-blue-green.sh
          bash -n scripts/deploy/bootstrap-production-layout.sh
          bash -n scripts/deploy/assert-production-safety.sh

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.DEPLOY_SSH_PORT }}" -H "${{ secrets.DEPLOY_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload optional canonical environment
        id: env_source
        env:
          PRODUCTION_ENV_FILE_B64: ${{ secrets.PRODUCTION_ENV_FILE_B64 }}
        run: |
          set -euo pipefail
          REMOTE_ENV_SOURCE=''
          if [[ -n "${PRODUCTION_ENV_FILE_B64:-}" ]]; then
            printf '%s' "$PRODUCTION_ENV_FILE_B64" | base64 --decode > production.env
            chmod 600 production.env
            REMOTE_ENV_SOURCE="/tmp/persiantoolbox-production-${GITHUB_RUN_ID}.env"
            scp -O -P "${{ secrets.DEPLOY_SSH_PORT }}" \
              production.env \
              "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:${REMOTE_ENV_SOURCE}"
          fi
          echo "remote_env_source=$REMOTE_ENV_SOURCE" >> "$GITHUB_OUTPUT"

      - name: Atomic blue-green deploy on VPS
        id: deploy_vps
        env:
          IP: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_KEY_PATH: /home/runner/.ssh/id_ed25519
          SITE_URL: ${{ env.BASE_URL }}
          PRODUCTION_DEPLOY_SHA: ${{ steps.meta.outputs.release_sha }}
          PRODUCTION_CURRENT_SHA: ${{ env.CURRENT_PRODUCTION_SHA }}
          PRODUCTION_ENV_SOURCE: ${{ steps.env_source.outputs.remote_env_source }}
        run: |
          set -euo pipefail
          bash deploy-blue-green.sh

      - name: Verify active slot and independent production audit
        run: |
          set -euo pipefail
          EXPECTED_RELEASE_SHA="${{ steps.meta.outputs.release_sha }}"
          ssh -p "${{ secrets.DEPLOY_SSH_PORT }}" \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" \
            bash -s -- "$DEPLOY_BASE_DIR" "$BASE_URL" "$EXPECTED_RELEASE_SHA" <<'REMOTE'
          set -Eeuo pipefail
          BASE_DIR="$1"
          BASE_URL="$2"
          EXPECTED_RELEASE_SHA="$3"
          STATE="$BASE_DIR/shared/deploy/production-current.env"
          test -f "$STATE"
          set -a
          source "$STATE"
          set +a
          test "$RELEASE_SHA" = "$EXPECTED_RELEASE_SHA"
          [[ "$ACTIVE_PORT" == '3000' || "$ACTIVE_PORT" == '3003' ]]
          bash "$RELEASE_DIR/scripts/deploy/verify-release-assets.sh" \
            "http://127.0.0.1:$ACTIVE_PORT" "$EXPECTED_RELEASE_SHA"
          bash "$RELEASE_DIR/scripts/deploy/verify-release-assets.sh" \
            "$BASE_URL" "$EXPECTED_RELEASE_SHA"
          bash "$RELEASE_DIR/scripts/deploy/assert-production-safety.sh" \
            "$EXPECTED_RELEASE_SHA" "$BASE_URL" "$BASE_DIR"
          REMOTE

      - name: Generate strict production report
        id: post_report
        timeout-minutes: 8
        run: |
          set -euo pipefail
          REPORT_NAME="post-deploy-production-${{ github.run_id }}.md"
          REMOTE_REPORT="/tmp/${REPORT_NAME}"
          REMOTE_STATUS="/tmp/${REPORT_NAME}.status"
          LOCAL_REPORT="docs/deployment/reports/${REPORT_NAME}"
          LOCAL_STATUS="docs/deployment/reports/${REPORT_NAME}.status"
          mkdir -p docs/deployment/reports
          ssh -p "${{ secrets.DEPLOY_SSH_PORT }}" \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" \
            bash -s -- \
              "$DEPLOY_BASE_DIR" "$BASE_URL" "${{ steps.meta.outputs.release_sha }}" \
              "$REMOTE_REPORT" "$REMOTE_STATUS" "$POST_REPORT_STRICT" "$RUN_MIGRATIONS" <<'REMOTE'
          set -Eeuo pipefail
          BASE_DIR="$1"
          BASE_URL="$2"
          RELEASE_SHA="$3"
          REMOTE_REPORT="$4"
          REMOTE_STATUS="$5"
          STRICT="$6"
          MIGRATIONS="$7"
          cd "$BASE_DIR/current/production"
          set -a
          source "$BASE_DIR/shared/env/production.env"
          set +a
          set +e
          node scripts/deploy/generate-post-deploy-report.mjs \
            --base-url="$BASE_URL" \
            --environment=production \
            --git-ref="$RELEASE_SHA" \
            --output="$REMOTE_REPORT" \
            --strict="$STRICT" \
            --migration-executed="$MIGRATIONS" \
            --backup-path=/home/ubuntu/backups \
            --backup-max-age-hours=36 \
            --retry-count=2 \
            --retry-delay-ms=400 \
            --timeout-ms=5000
          REPORT_EXIT=$?
          set -e
          printf '%s' "$REPORT_EXIT" > "$REMOTE_STATUS"
          REMOTE
          scp -O -P "${{ secrets.DEPLOY_SSH_PORT }}" \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:${REMOTE_REPORT}" "$LOCAL_REPORT"
          scp -O -P "${{ secrets.DEPLOY_SSH_PORT }}" \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:${REMOTE_STATUS}" "$LOCAL_STATUS"
          REPORT_EXIT_CODE="$(cat "$LOCAL_STATUS")"
          [[ "$REPORT_EXIT_CODE" == '0' ]] || exit "$REPORT_EXIT_CODE"

      - name: Roll back to recorded previous slot on any post-switch failure
        if: failure() && steps.deploy_vps.outcome == 'success'
        run: |
          ssh -p "${{ secrets.DEPLOY_SSH_PORT }}" \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" \
            bash "$DEPLOY_BASE_DIR/current/production/ops/deploy/rollback.sh" \
              --env production \
              --base-dir "$DEPLOY_BASE_DIR" \
              --base-url "$BASE_URL"

      - name: Remove temporary environment source
        if: always()
        run: |
          set -euo pipefail
          REMOTE_ENV_SOURCE="${{ steps.env_source.outputs.remote_env_source }}"
          if [[ -n "$REMOTE_ENV_SOURCE" ]]; then
            ssh -p "${{ secrets.DEPLOY_SSH_PORT }}" \
              "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" \
              rm -f "$REMOTE_ENV_SOURCE"
          fi
          rm -f production.env

      - name: Upload production report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-post-deploy-report
          path: docs/deployment/reports/post-deploy-production-${{ github.run_id }}.md
          if-no-files-found: warn
