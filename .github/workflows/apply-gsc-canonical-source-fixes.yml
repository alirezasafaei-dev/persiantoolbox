name: Apply GSC canonical source fixes

on:
  push:
    branches:
      - seo/gsc-canonical-dataset-audit-2026-07-18

permissions:
  contents: write

concurrency:
  group: apply-gsc-canonical-source-fixes
  cancel-in-progress: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: seo/gsc-canonical-dataset-audit-2026-07-18
          fetch-depth: 0

      - name: Normalize canonical sources
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path
          import re

          def write(path: str, text: str) -> None:
              Path(path).write_text(text, encoding='utf-8')

          def remove_search_action(path: str) -> None:
              lines = Path(path).read_text(encoding='utf-8').splitlines(keepends=True)
              marker_indexes = [i for i, line in enumerate(lines) if "'@type': 'SearchAction'" in line]
              if not marker_indexes:
                  return
              if len(marker_indexes) != 1:
                  raise SystemExit(f'{path}: expected at most one SearchAction, found {len(marker_indexes)}')

              marker = marker_indexes[0]
              start = marker - 1
              if start < 0 or 'potentialAction:' not in lines[start]:
                  raise SystemExit(f'{path}: SearchAction parent was not found')

              indent = lines[start][: len(lines[start]) - len(lines[start].lstrip())]
              end = None
              for index in range(marker + 1, len(lines)):
                  if lines[index].startswith(indent) and lines[index].strip() == '},':
                      end = index
                      break
              if end is None:
                  raise SystemExit(f'{path}: SearchAction closing brace was not found')

              del lines[start : end + 1]
              write(path, ''.join(lines))

          def replace_once(path: str, old: str, new: str) -> None:
              text = Path(path).read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected exactly one literal match, found {count}')
              write(path, text.replace(old, new, 1))

          remove_search_action('app/layout.tsx')
          remove_search_action('components/HomePage.tsx')

          replace_once(
              'lib/blog.ts',
              "    tags: (data['tags'] as string[]) ?? [],\n",
              """    tags: Array.from(
                new Set(
                  ((data['tags'] as string[]) ?? [])
                    .map((tag) => String(tag).trim())
                    .filter(Boolean),
                ),
              ),
          """,
          )

          replace_once(
              'lib/blog.ts',
              """export function getPostsByTag(tag: string): BlogPostMeta[] {
            return getAllPosts().filter((post) => post.tags.includes(tag));
          }
          """.replace('          ', ''),
              """export function getPostsByTag(tag: string): BlogPostMeta[] {
            const normalizedTag = tag.trim();
            return getAllPosts().filter((post) => post.tags.includes(normalizedTag));
          }
          """.replace('          ', ''),
          )

          route_path = 'app/blog/tag/[tag]/page.tsx'
          route = Path(route_path).read_text(encoding='utf-8')
          route = route.replace(
              "import { notFound } from 'next/navigation';",
              "import { notFound, permanentRedirect } from 'next/navigation';",
              1,
          )

          metadata_pattern = re.compile(
              r"  const \{ tag \} = await params;\n  const posts = getPostsByTag\(tag\);"
          )
          route, count = metadata_pattern.subn(
              "  const { tag: rawTag } = await params;\n"
              "  const tag = rawTag.trim();\n"
              "  const posts = getPostsByTag(tag);",
              route,
              count=1,
          )
          if count != 1:
              raise SystemExit(f'{route_path}: metadata tag block match count={count}')

          route, count = metadata_pattern.subn(
              "  const { tag: rawTag } = await params;\n"
              "  const tag = rawTag.trim();\n"
              "  if (tag !== rawTag) {\n"
              "    permanentRedirect(`/blog/tag/${encodeURIComponent(tag)}`);\n"
              "  }\n"
              "  const posts = getPostsByTag(tag);",
              route,
              count=1,
          )
          if count != 1:
              raise SystemExit(f'{route_path}: page tag block match count={count}')

          route = route.replace(
              "    { name: `برچسب: ${tag}`, url: `${siteUrl}/blog/tag/${tag}` },",
              "    { name: `برچسب: ${tag}`, url: `${siteUrl}/blog/tag/${encodeURIComponent(tag)}` },",
              1,
          )
          route = route.replace(
              "              href={`/blog/tag/${t.tag}`}",
              "              href={`/blog/tag/${encodeURIComponent(t.tag)}`}",
              1,
          )
          write(route_path, route)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/apply-gsc-canonical-source-fixes.yml
          git add app/layout.tsx components/HomePage.tsx lib/blog.ts app/blog/tag/'[tag]'/page.tsx
          git diff --cached --check
          git commit -s -m "fix(seo): normalize crawl sources and tag canonicals"
          git push origin HEAD:seo/gsc-canonical-dataset-audit-2026-07-18
