name: Fix PR 149 tool date narrowing

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/gsc-observability
          fetch-depth: 0

      - name: Narrow maintained tool dates
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          path = Path('app/sitemap.ts')
          text = path.read_text(encoding='utf-8')
          old = """  const toolLastModified = new Map<string, string>(
            indexableTools
              .filter((tool) => Boolean(tool.lastModified))
              .map((tool) => [tool.path, tool.lastModified] as const),
          );
          """.replace('          ', '')
          new = """  const toolLastModified = new Map<string, string>(
            indexableTools.flatMap((tool) =>
              tool.lastModified ? ([[tool.path, tool.lastModified]] as const) : [],
            ),
          );
          """.replace('          ', '')
          if text.count(old) != 1:
              raise SystemExit('toolLastModified block not found exactly once')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/fix-pr149-tool-date-narrowing.yml
          git add app/sitemap.ts
          git diff --cached --check
          git commit -s -m "fix(seo): narrow maintained sitemap tool dates"
          git push origin HEAD:feat/gsc-observability
