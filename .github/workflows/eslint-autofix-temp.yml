name: eslint-autofix-temp

on:
  push:
    branches:
      - fix/address-transliteration-hardening

permissions:
  contents: write

jobs:
  autofix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/address-transliteration-hardening
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply ESLint fixes
        shell: bash
        run: |
          set -Eeuo pipefail
          pnpm exec eslint . --fix || true
          git diff --check
          if git diff --quiet; then
            echo 'NO_CHANGES=true'
            exit 0
          fi
          git config user.name 'ASDEV Automation'
          git config user.email 'alirezasafaeisystems@gmail.com'
          git add -A
          git commit -s -m 'fix(lint): normalize strict repository style'
          git push origin HEAD:fix/address-transliteration-hardening
