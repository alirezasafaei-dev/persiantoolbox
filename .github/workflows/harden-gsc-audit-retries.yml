name: Harden GSC audit retries

on:
  push:
    branches:
      - seo/gsc-canonical-dataset-audit-2026-07-18

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: seo/gsc-canonical-dataset-audit-2026-07-18
          fetch-depth: 0

      - name: Add bounded retries and reduce audit pressure
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'scripts/quality/audit-gsc-search-signals.mjs',
              "const STRICT_WARNINGS = args.includes('--strict-warnings');\n",
              "const STRICT_WARNINGS = args.includes('--strict-warnings');\nconst RETRIES = Number(getArgValue('--retries', '2'));\n",
          )

          replace_once(
              'scripts/quality/audit-gsc-search-signals.mjs',
              """const fetchText = async (url, options = {}) => {
            const response = await fetch(url, {
              ...options,
              headers: {
                'user-agent': 'PersianToolbox-GSC-Audit/1.0',
                ...(options.headers ?? {}),
              },
              signal: AbortSignal.timeout(TIMEOUT_MS),
            });
            const text = await response.text();
            return { response, text };
          };
          """.replace('          ', ''),
              """const sleep = (milliseconds) =>
            new Promise((resolve) => setTimeout(resolve, milliseconds));

          const fetchText = async (url, options = {}) => {
            let lastError;
            for (let attempt = 0; attempt <= RETRIES; attempt += 1) {
              try {
                const response = await fetch(url, {
                  ...options,
                  headers: {
                    'user-agent': 'PersianToolbox-GSC-Audit/1.0',
                    ...(options.headers ?? {}),
                  },
                  signal: AbortSignal.timeout(TIMEOUT_MS),
                });
                const text = await response.text();
                return { response, text, attempts: attempt + 1 };
              } catch (error) {
                lastError = error;
                if (attempt < RETRIES) {
                  await sleep((attempt + 1) * 1500);
                }
              }
            }
            throw lastError instanceof Error ? lastError : new Error(String(lastError));
          };
          """.replace('          ', ''),
          )

          workflow = Path('.github/workflows/gsc-search-signals-audit.yml')
          text = workflow.read_text(encoding='utf-8')
          text = text.replace('timeout-minutes: 25', 'timeout-minutes: 45', 1)
          text = text.replace('--concurrency 8', '--concurrency 4', 1)
          text = text.replace('--timeout-ms 20000', '--timeout-ms 45000\\\n            --retries 2', 1)
          workflow.write_text(text, encoding='utf-8')
          PY

          node --check scripts/quality/audit-gsc-search-signals.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/harden-gsc-audit-retries.yml
          git add scripts/quality/audit-gsc-search-signals.mjs .github/workflows/gsc-search-signals-audit.yml
          git diff --cached --check
          git commit -s -m "fix(seo): retry transient production audit timeouts"
          git push origin HEAD:seo/gsc-canonical-dataset-audit-2026-07-18
