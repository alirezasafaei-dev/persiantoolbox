name: address-quality-diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - 'features/text-tools/address-fa-to-en*'
      - 'components/features/text-tools/AddressFaToEnTool.tsx'
      - '.github/workflows/address-quality-diagnostics.yml'

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run focused diagnostics
        id: diagnostics
        shell: bash
        run: |
          set +e
          mkdir -p diagnostics/fixed

          pnpm exec eslint . --fix > diagnostics/eslint-fix.log 2>&1
          fix_status=$?

          git diff --name-only --diff-filter=ACM > diagnostics/fixed-files.txt
          while IFS= read -r file; do
            [[ -n "$file" ]] || continue
            mkdir -p "diagnostics/fixed/$(dirname "$file")"
            cp "$file" "diagnostics/fixed/$file"
          done < diagnostics/fixed-files.txt

          pnpm lint > diagnostics/lint-after-fix.log 2>&1
          lint_status=$?
          pnpm typecheck > diagnostics/typecheck.log 2>&1
          typecheck_status=$?
          pnpm vitest --run features/text-tools/address-fa-to-en.test.ts > diagnostics/address-tests.log 2>&1
          test_status=$?

          printf 'eslint_fix=%s\nlint=%s\ntypecheck=%s\ntests=%s\n' \
            "$fix_status" "$lint_status" "$typecheck_status" "$test_status" \
            | tee diagnostics/status.txt

          if (( lint_status != 0 || typecheck_status != 0 || test_status != 0 )); then
            exit 1
          fi
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: address-quality-diagnostics
          path: diagnostics
          if-no-files-found: error
