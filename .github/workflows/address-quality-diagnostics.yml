name: address-quality-diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - 'features/text-tools/address-fa-to-en*'
      - 'components/features/text-tools/AddressFaToEnTool.tsx'
      - '.github/workflows/address-quality-diagnostics.yml'

permissions:
  contents: write

jobs:
  diagnostics:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply isolated ESLint fix
        shell: bash
        run: |
          set -Eeuo pipefail
          pnpm exec eslint components/features/pricing/PricingContent.tsx --fix
          if git diff --quiet -- components/features/pricing/PricingContent.tsx; then
            echo 'NO_AUTOFIX_CHANGE=true'
            exit 0
          fi
          git config user.name 'ASDEV Automation'
          git config user.email 'alirezasafaeisystems@gmail.com'
          git add components/features/pricing/PricingContent.tsx
          git commit -s -m 'fix(lint): normalize pricing trial control flow'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
