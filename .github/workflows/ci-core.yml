name: ci-core

on:
  pull_request:
  push:
    branches: [main, release/v2-license-prep]

jobs:
  licensing-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm licensing:validate

  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm ci:contracts

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm ci:quick
      - run: pnpm docs:auto:check

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm performance:budgets

  e2e-chromium:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run Chromium E2E shard ${{ matrix.shard }}/4
        run: pnpm test:e2e:ci --shard=${{ matrix.shard }}/4
      - name: Upload E2E failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-chromium-shard-${{ matrix.shard }}
          path: |
            playwright-report
            test-results
          if-no-files-found: warn

  smoke-asdev:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Playwright smoke /asdev mobile
        env:
          PLAYWRIGHT_SKIP_FIREFOX: '1'
        run: pnpm exec playwright test --config=playwright.config.ts --project=chromium --grep "asdev" --reporter=list --workers=2

  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm security:secrets
      - run: pnpm security:scan

  dependency-lock-refresh:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/payment-revenue-hardening-2026-07-20'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
      - name: Add patched brace-expansion overrides
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.pnpm ??= {};
          pkg.pnpm.overrides ??= {};
          Object.assign(pkg.pnpm.overrides, {
            'brace-expansion@1.1.15': '1.1.16',
            'brace-expansion@2.1.1': '2.1.2',
            'brace-expansion@5.0.6': '5.0.7',
          });
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
      - name: Regenerate lockfile
        run: pnpm install --lockfile-only --no-frozen-lockfile
      - name: Capture production dependency audit
        id: dependency_audit
        continue-on-error: true
        run: pnpm audit --prod --audit-level=high --ignore-registry-errors --json > dependency-audit.json
      - name: Upload patched dependency evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patched-dependency-lock
          path: |
            package.json
            pnpm-lock.yaml
            dependency-audit.json
          if-no-files-found: error
      - name: Enforce production dependency audit
        if: steps.dependency_audit.outcome == 'failure'
        run: exit 1

  readiness-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - contracts
      - quality
      - build
      - e2e-chromium
      - security-audit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm deploy:readiness:summary
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deployment-readiness-summary
          path: docs/deployment/reports/readiness-summary-*.json
          if-no-files-found: warn
