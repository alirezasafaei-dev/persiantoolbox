name: ci-core

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - name: Structured Vitest diagnostic
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          pnpm vitest --run --reporter=json --outputFile=/tmp/vitest.json > /tmp/vitest.stdout 2>&1
          test_status=$?
          set -e

          if [ "$test_status" -eq 0 ]; then
            echo "Vitest passed."
            exit 0
          fi

          node <<'NODE' > /tmp/vitest-summary.txt
          const fs = require('node:fs');
          const stdout = fs.existsSync('/tmp/vitest.stdout')
            ? fs.readFileSync('/tmp/vitest.stdout', 'utf8')
            : '';
          let report = null;
          try {
            report = JSON.parse(fs.readFileSync('/tmp/vitest.json', 'utf8'));
          } catch (error) {
            console.log('Vitest JSON report could not be parsed.');
            console.log(String(error));
          }

          const failures = [];
          const files = report?.testResults ?? report?.files ?? [];
          for (const file of files) {
            const assertions = file.assertionResults ?? file.testResults ?? file.tasks ?? [];
            for (const assertion of assertions) {
              const status = assertion.status ?? assertion.state ?? assertion.result?.state;
              if (status !== 'failed' && status !== 'fail') continue;
              const name = assertion.fullName ?? assertion.title ?? assertion.name ?? 'Unnamed test';
              const messages = assertion.failureMessages ?? assertion.errors?.map((item) => item?.message ?? String(item)) ?? [];
              failures.push({
                file: file.name ?? file.filepath ?? file.path ?? 'Unknown file',
                name,
                messages,
              });
            }
            if ((file.status === 'failed' || file.status === 'fail') && assertions.length === 0) {
              failures.push({
                file: file.name ?? file.filepath ?? file.path ?? 'Unknown file',
                name: 'File-level failure',
                messages: [file.message ?? file.failureMessage ?? 'No failure message in JSON report.'],
              });
            }
          }

          if (failures.length > 0) {
            console.log(`Failed assertions: ${failures.length}`);
            for (const [index, failure] of failures.entries()) {
              console.log(`\n${index + 1}. ${failure.file}`);
              console.log(`   ${failure.name}`);
              for (const message of failure.messages) {
                console.log(String(message).replace(/\u001b\[[0-9;]*m/g, '').slice(0, 5000));
              }
            }
          } else {
            console.log('No assertion-level failure was found in the JSON structure.');
            if (report?.failureMessage) console.log(String(report.failureMessage).slice(0, 8000));
            console.log('\nFinal Vitest stdout lines:');
            console.log(stdout.split('\n').slice(-100).join('\n'));
          }
          NODE

          {
            echo "## Structured Vitest diagnostic"
            echo
            echo "Head: \`${{ github.event.pull_request.head.sha }}\`"
            echo
            echo '```text'
            cat /tmp/vitest-summary.txt
            echo '```'
          } > /tmp/vitest-comment.md

          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/vitest-comment.md || true
          cat /tmp/vitest-summary.txt
          exit "$test_status"
