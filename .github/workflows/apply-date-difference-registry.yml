name: Apply date difference registry

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: seo/date-difference-ctr-2026-07
          fetch-depth: 0

      - name: Align central registry
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path
          import re

          path = Path('lib/tools-registry.ts')
          text = path.read_text(encoding='utf-8')
          pattern = re.compile(
              r"  \{\n    id: 'date-difference',\n[\s\S]*?\n  \},\n(?=  \{\n    id: 'persian-calendar',)"
          )
          replacement = """  {
            id: 'date-difference',
            path: '/date-tools/date-difference',
            title: 'محاسبه فاصله بین دو تاریخ شمسی و میلادی | تعداد روز',
            description:
              'فاصله دو تاریخ را به تعداد دقیق روز، هفته، ماه و سال تقریبی محاسبه کنید؛ با پشتیبانی از تاریخ شمسی و میلادی، رایگان و بدون ثبت‌نام.',
            keywords: [
              'محاسبه فاصله دو تاریخ',
              'تعداد روز بین دو تاریخ',
              'اختلاف تاریخ شمسی',
              'اختلاف تاریخ میلادی',
              'محاسبه روز بین دو تاریخ',
              'روز شمار آنلاین',
            ],
            indexable: true,
            lastModified: '2026-07-18',
            kind: 'tool',
            category: categoryOrThrow('date'),
          },
          """.replace('          ', '')
          updated, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'expected one date-difference registry entry, found {count}')
          path.write_text(updated, encoding='utf-8')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/apply-date-difference-registry.yml
          git add lib/tools-registry.ts
          git diff --cached --check
          git commit -s -m "fix(seo): align date-difference registry metadata"
          git push origin HEAD:seo/date-difference-ctr-2026-07
