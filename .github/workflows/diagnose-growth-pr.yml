name: diagnose-growth-pr

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'feat/organic-growth-engine-p0'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Capture lint, typecheck and build diagnostics
        shell: bash
        run: |
          set +e
          pnpm lint > diagnostics-lint.log 2>&1
          lint_status=$?
          pnpm typecheck > diagnostics-typecheck.log 2>&1
          typecheck_status=$?
          pnpm build > diagnostics-build.log 2>&1
          build_status=$?
          printf 'lint=%s\ntypecheck=%s\nbuild=%s\n' "$lint_status" "$typecheck_status" "$build_status" | tee diagnostics-status.txt
          cat diagnostics-lint.log diagnostics-typecheck.log diagnostics-build.log > diagnostics-all.log
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: growth-pr-diagnostics
          path: |
            diagnostics-status.txt
            diagnostics-lint.log
            diagnostics-typecheck.log
            diagnostics-build.log
            diagnostics-all.log
          if-no-files-found: error
          retention-days: 1
