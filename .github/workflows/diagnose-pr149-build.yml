name: Diagnose PR 149 build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/gsc-observability
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - name: Build and persist diagnostic tail
        shell: bash
        run: |
          set +e
          NODE_OPTIONS=--max-old-space-size=4096 pnpm build > /tmp/pr149-build.log 2>&1
          status=$?
          mkdir -p reports/validation
          {
            echo "status=${status}"
            echo "commit=${GITHUB_SHA}"
            echo
            tail -n 180 /tmp/pr149-build.log | sed -E 's#(/home/runner/work/)[^ ]+#<runner-path>#g'
          } > reports/validation/pr149-build-tail.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/validation/pr149-build-tail.txt
          if ! git diff --cached --quiet; then
            git commit -s -m "chore(gsc): capture PR 149 build diagnostic"
            git push origin HEAD:feat/gsc-observability
          fi
          exit 0
