name: finalize-layout-bootstrap

on:
  pull_request:
    paths:
      - '.github/workflows/finalize-layout-bootstrap.yml'

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Harden bootstrap, engine and production workflow
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one patch target, found {count}')
              path.write_text(text.replace(old, new))

          bootstrap = Path('scripts/deploy/bootstrap-production-layout.sh')
          replace_once(
              bootstrap,
              """const candidates = entries
            .filter((entry) => entry?.pm2_env?.status === 'online')
            .filter((entry) => {
              const envPort = entry?.pm2_env?.env?.PORT ?? entry?.pm2_env?.PORT;
              return String(envPort ?? '') === String(port);
            })
            .sort((left, right) => {
              const leftRank = preferredNames.indexOf(left.name);
              const rightRank = preferredNames.indexOf(right.name);
              return (leftRank === -1 ? 99 : leftRank) - (rightRank === -1 ? 99 : rightRank);
            });

          if (candidates.length === 0) {
            process.exit(2);
          }
          const selected = candidates[0];""",
              """const online = entries.filter((entry) => entry?.pm2_env?.status === 'online');
          const rank = (entry) => {
            const index = preferredNames.indexOf(entry.name);
            return index === -1 ? 99 : index;
          };
          const portMatches = online
            .filter((entry) => {
              const envPort = entry?.pm2_env?.env?.PORT ?? entry?.pm2_env?.PORT;
              return String(envPort ?? '') === String(port);
            })
            .sort((left, right) => rank(left) - rank(right));
          const namedMatches = online
            .filter((entry) => preferredNames.includes(entry.name))
            .sort((left, right) => rank(left) - rank(right));
          const selected = portMatches[0] ?? namedMatches[0];

          if (!selected) {
            process.exit(2);
          }""",
          )
          replace_once(
              bootstrap,
              """if [[ ! -f "$ENV_FILE" ]]; then
            env_candidates=()
            [[ -n "$ENV_SOURCE" ]] && env_candidates+=("$ENV_SOURCE")
            env_candidates+=(
              "$CURRENT_RELEASE/.env"
              "/home/ubuntu/persiantoolbox/.env"
              "/home/ubuntu/persiantoolbox-current/.env"
            )
            selected_env=""
            for candidate in "${env_candidates[@]}"; do
              if [[ -f "$candidate" ]]; then
                selected_env="$candidate"
                break
              fi
            done
            [[ -n "$selected_env" ]] || {
              echo "[bootstrap] no production environment source was found" >&2
              exit 1
            }
            install -m 600 "$selected_env" "$ENV_FILE"
          else
            chmod 600 "$ENV_FILE"
          fi""",
              """if [[ -n "$ENV_SOURCE" ]]; then
            [[ -f "$ENV_SOURCE" ]] || {
              echo "[bootstrap] explicit production environment source is missing" >&2
              exit 1
            }
            install -m 600 "$ENV_SOURCE" "$ENV_FILE"
          elif [[ ! -f "$ENV_FILE" ]]; then
            env_candidates=(
              "$CURRENT_RELEASE/.env"
              "/home/ubuntu/persiantoolbox/.env"
              "/home/ubuntu/persiantoolbox-current/.env"
            )
            selected_env=""
            for candidate in "${env_candidates[@]}"; do
              if [[ -f "$candidate" ]]; then
                selected_env="$candidate"
                break
              fi
            done
            [[ -n "$selected_env" ]] || {
              echo "[bootstrap] no production environment source was found" >&2
              exit 1
            }
            install -m 600 "$selected_env" "$ENV_FILE"
          else
            chmod 600 "$ENV_FILE"
          fi""",
          )
          replace_once(
              bootstrap,
              """  existing_release_sha="$(sed -nE 's/^RELEASE_GIT_SHA=([0-9a-f]{40})$/\\1/p' \\
            "$CURRENT_RELEASE/.env.release" 2>/dev/null | tail -1 || true)"
          if [[ -n "$existing_release_sha" && "$existing_release_sha" != "$EXPECTED_CURRENT_SHA" ]]; then
            echo "[bootstrap] existing release metadata conflicts with expected current SHA" >&2
            exit 1
          fi

          printf '%s\\n' "$EXPECTED_CURRENT_SHA" > "$CURRENT_RELEASE/.git-revision.tmp""".replace('          ', ''),
              """  existing_release_sha="$(sed -nE 's/^RELEASE_GIT_SHA=([0-9a-f]{40})$/\\1/p' \\
            "$CURRENT_RELEASE/.env.release" 2>/dev/null | tail -1 || true)"
          if [[ -n "$existing_release_sha" && "$existing_release_sha" != "$EXPECTED_CURRENT_SHA" ]]; then
            echo "[bootstrap] existing release metadata conflicts with expected current SHA" >&2
            exit 1
          fi
          existing_revision="$(tr -d '[:space:]' < "$CURRENT_RELEASE/.git-revision" 2>/dev/null || true)"
          if [[ -n "$existing_revision" && "$existing_revision" != "$EXPECTED_CURRENT_SHA" ]]; then
            echo "[bootstrap] existing git revision conflicts with expected current SHA" >&2
            exit 1
          fi

          printf '%s\\n' "$EXPECTED_CURRENT_SHA" > "$CURRENT_RELEASE/.git-revision.tmp""".replace('          ', ''),
          )

          engine = Path('ops/deploy/deploy-production-blue-green.sh')
          replace_once(
              engine,
              """if [[ "$CURRENT_PORT" != "$BLUE_PORT" && "$CURRENT_PORT" != "$GREEN_PORT" ]]; then
            echo "[production-deploy] cannot identify a running active production slot" >&2
            exit 1
          fi

          if [[ "$CURRENT_PORT" == "$BLUE_PORT" ]]; then""".replace('          ', ''),
              """if [[ "$CURRENT_PORT" != "$BLUE_PORT" && "$CURRENT_PORT" != "$GREEN_PORT" ]]; then
            echo "[production-deploy] cannot identify a running active production slot" >&2
            exit 1
          fi
          if [[ -n "${CURRENT_PORT_OVERRIDE:-}" && "$CURRENT_PORT_OVERRIDE" != "$CURRENT_PORT" ]]; then
            echo "[production-deploy] bootstrap port disagrees with nginx active port" >&2
            exit 1
          fi

          if [[ "$CURRENT_PORT" == "$BLUE_PORT" ]]; then""".replace('          ', ''),
          )
          replace_once(
              engine,
              """CURRENT_PROCESS="persiantoolbox-$CURRENT_SLOT"
          NEW_PROCESS="persiantoolbox-$NEW_SLOT"
          CURRENT_RELEASE="$(readlink -f "$CURRENT_LINK" 2>/dev/null || true)"
          if [[ -z "$CURRENT_RELEASE" || ! -d "$CURRENT_RELEASE" ]]; then
            CURRENT_RELEASE="$(readlink -f /home/ubuntu/persiantoolbox 2>/dev/null || true)"
          fi
          CURRENT_COMMIT="$(curl -fsS --connect-timeout 3 --max-time 8 "http://127.0.0.1:$CURRENT_PORT/api/version" \\
            | sed -nE 's/.*"commit":"([^"]+)".*/\\1/p' | head -1 || true)""".replace('          ', ''),
              """if [[ -n "${CURRENT_SLOT_OVERRIDE:-}" && "$CURRENT_SLOT_OVERRIDE" != "$CURRENT_SLOT" ]]; then
            echo "[production-deploy] bootstrap slot disagrees with nginx active slot" >&2
            exit 1
          fi
          CURRENT_PROCESS="${CURRENT_PROCESS_OVERRIDE:-persiantoolbox-$CURRENT_SLOT}"
          NEW_PROCESS="persiantoolbox-$NEW_SLOT"
          CURRENT_RELEASE="${CURRENT_RELEASE_OVERRIDE:-$(readlink -f "$CURRENT_LINK" 2>/dev/null || true)}"
          if [[ -z "$CURRENT_RELEASE" || ! -d "$CURRENT_RELEASE" ]]; then
            CURRENT_RELEASE="$(readlink -f /home/ubuntu/persiantoolbox 2>/dev/null || true)"
          fi
          CURRENT_RELEASE="$(readlink -f "$CURRENT_RELEASE" 2>/dev/null || true)"
          [[ -d "$CURRENT_RELEASE" ]] || {
            echo "[production-deploy] current release directory is missing" >&2
            exit 1
          }
          CURRENT_PID="$(pm2 pid "$CURRENT_PROCESS" | head -1 | tr -d '[:space:]')"
          [[ "$CURRENT_PID" =~ ^[1-9][0-9]*$ ]] || {
            echo "[production-deploy] current PM2 process is not online: $CURRENT_PROCESS" >&2
            exit 1
          }
          CURRENT_COMMIT="${CURRENT_COMMIT_OVERRIDE:-$(curl -fsS --connect-timeout 3 --max-time 8 "http://127.0.0.1:$CURRENT_PORT/api/version" \\
            | sed -nE 's/.*"commit":"([^"]+)".*/\\1/p' | head -1 || true)}""".replace('          ', ''),
          )

          workflow = Path('.github/workflows/deploy-production.yml')
          replace_once(
              workflow,
              """      allow_recovery_deploy:
                description: Skip only the current release health assertion; candidate and final audits remain strict
                required: false
                default: 'false'
                type: choice
                options: ['false', 'true']
              base_url:""".replace('              ', ''),
              """      allow_recovery_deploy:
                description: Skip only the current release health assertion; candidate and final audits remain strict
                required: false
                default: 'false'
                type: choice
                options: ['false', 'true']
              allow_legacy_cache_bootstrap:
                description: One-time migration only; skip unsafe cache headers on the current release before switching
                required: false
                default: 'false'
                type: choice
                options: ['false', 'true']
              base_url:""".replace('              ', ''),
          )
          replace_once(
              workflow,
              "      ALLOW_RECOVERY_DEPLOY: ${{ github.event.inputs.allow_recovery_deploy || 'false' }}\n      BASE_URL:",
              "      ALLOW_RECOVERY_DEPLOY: ${{ github.event.inputs.allow_recovery_deploy || 'false' }}\n      ALLOW_LEGACY_CACHE_BOOTSTRAP: ${{ github.event.inputs.allow_legacy_cache_bootstrap || 'false' }}\n      BASE_URL:",
          )
          replace_once(
              workflow,
              """          PRODUCTION_ENV_SOURCE: ${{ steps.env_source.outputs.remote_env_source }}
                run: |""".replace('                ', ''),
              """          PRODUCTION_ENV_SOURCE: ${{ steps.env_source.outputs.remote_env_source }}
                ALLOW_NON_MAIN_PRODUCTION_DEPLOY: 'true'
                run: |""".replace('                ', ''),
          )
          PY
          bash -n scripts/deploy/bootstrap-production-layout.sh
          bash -n ops/deploy/deploy-production-blue-green.sh
          git rm .github/workflows/finalize-layout-bootstrap.yml
      - name: Commit final topology hardening
        run: |
          git config user.name 'OpenAI Codex'
          git config user.email 'codex@openai.com'
          git add scripts/deploy/bootstrap-production-layout.sh ops/deploy/deploy-production-blue-green.sh .github/workflows/deploy-production.yml
          git commit -m 'fix(deploy): validate migrated runtime topology'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
