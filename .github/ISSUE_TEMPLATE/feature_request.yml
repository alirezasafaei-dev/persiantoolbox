# asdev:template_id=issue-feature version=1.0.0 source=standards/coding/level-0.md
name: Feature request
description: Propose an enhancement
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Proposals are easiest to review when they explain the user problem,
        the expected product impact, and any privacy or operational tradeoffs.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Change scope
      options:
        - Small polish or documentation change
        - Single feature area
        - Cross-cutting product change
        - Unsure
    validations:
      required: true
  - type: dropdown
    id: privacy
    attributes:
      label: Privacy / local-first considerations
      options:
        - No privacy impact
        - Needs review for local-first behavior
        - Requires server-side handling of user data
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Suggested validation
      description: Tests, routes, metrics, or screenshots that should prove the change works
      placeholder: 'Example: update unit tests, run `pnpm vitest --run`, verify `/pricing`'
