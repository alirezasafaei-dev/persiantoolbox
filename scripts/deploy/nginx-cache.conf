# Redis + Nginx Caching Configuration for PersianToolbox
# Add this file to /etc/nginx/conf.d/cache.conf or include it in your nginx config

# Cache paths
proxy_cache_path /var/cache/nginx/persiantoolbox/static
  levels=1:2
  keys_zone=static_cache:10m
  max_size=256m
  inactive=7d
  use_temp_path=off;

proxy_cache_path /var/cache/nginx/persiantoolbox/pages
  levels=1:2
  keys_zone=pages_cache:10m
  max_size=512m
  inactive=1d
  use_temp_path=off;

proxy_cache_path /var/cache/nginx/persiantoolbox/api
  levels=1:2
  keys_zone=api_cache:5m
  max_size=64m
  inactive=5m
  use_temp_path=off;

# Cache key with scheme + host
proxy_cache_key "$scheme$host$request_uri";

# Shared cache lock to prevent thundering herd
proxy_cache_lock on;
proxy_cache_lock_timeout 5s;

# Serve stale cache on backend errors
proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

# Don't cache POST requests
proxy_cache_methods GET HEAD;

# Bypass cache for authenticated requests (cookie present)
map $http_cookie $skip_cache {
  default 0;
  ~*session 1;
  ~*token 1;
}

server {
  listen 80;
  listen [::]:80;
  server_name persiantoolbox.ir;

  # Static assets - long cache (Next.js _next/static)
  location /_next/static/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_cache static_cache;
    proxy_cache_valid 200 30d;
    proxy_cache_valid 404 1m;
    add_header X-Cache-Status $upstream_cache_status;
  }

  # Public assets - long cache
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp|avif)$ {
    proxy_pass http://127.0.0.1:3000;
    proxy_cache static_cache;
    proxy_cache_valid 200 30d;
    proxy_cache_valid 404 1m;
    expires 30d;
    add_header X-Cache-Status $upstream_cache_status;
  }

  # API routes - short cache, skip for authenticated
  location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_cache api_cache;
    proxy_cache_bypass $skip_cache;
    proxy_no_cache $skip_cache;
    proxy_cache_valid 200 5m;
    proxy_cache_valid 404 1m;
    proxy_cache_methods GET HEAD;
    add_header X-Cache-Status $upstream_cache_status;
  }

  # SSG pages - medium cache
  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_cache pages_cache;
    proxy_cache_bypass $skip_cache;
    proxy_no_cache $skip_cache;
    proxy_cache_valid 200 1h;
    proxy_cache_valid 404 1m;
    proxy_cache_methods GET HEAD;
    add_header X-Cache-Status $upstream_cache_status;
  }
}
